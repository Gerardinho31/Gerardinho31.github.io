---
layout: default
---

<div class="home">
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>

  <h2>Mes Projets</h2>
  <ul class="project-list">
    {% for project in site.projects %}
      <li>
        <span class="project-meta">{{ project.date | date: "%B %d, %Y" }}</span>
        <h3>
          <a class="project-link" href="{{ project.url | relative_url }}">
            {{ project.title | escape }}
          </a>
        </h3>
        <p>{{ project.description }}</p>
      </li>
    {% endfor %}
  </ul>

  <h2>Mon CV</h2>
  <p>Consultez mon <a href="{{ '/assets/pdf/CV.pdf' | relative_url }}">CV en PDF</a>.</p>
</div>
