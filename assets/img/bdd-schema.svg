<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Base de données relationnelle -->
  <defs>
    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tables -->
  <rect x="50" y="50" width="120" height="80" rx="5" fill="url(#dbGradient)" opacity="0.8"/>
  <text x="110" y="75" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Table 1</text>
  <line x1="60" y1="90" x2="160" y2="90" stroke="white" stroke-width="1"/>
  <text x="110" y="105" text-anchor="middle" fill="white" font-size="10">id, nom</text>
  <text x="110" y="120" text-anchor="middle" fill="white" font-size="10">date, lieu</text>
  
  <rect x="230" y="50" width="120" height="80" rx="5" fill="url(#dbGradient)" opacity="0.8"/>
  <text x="290" y="75" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Table 2</text>
  <line x1="240" y1="90" x2="340" y2="90" stroke="white" stroke-width="1"/>
  <text x="290" y="105" text-anchor="middle" fill="white" font-size="10">id, type</text>
  <text x="290" y="120" text-anchor="middle" fill="white" font-size="10">relation_id</text>
  
  <!-- Relation -->
  <path d="M 170 90 Q 200 60 230 90" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="50" text-anchor="middle" fill="#4a5568" font-size="11" font-weight="bold">1:N</text>
  
  <!-- Flèche -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>
  
  <!-- Légende -->
  <text x="200" y="180" text-anchor="middle" fill="#1f2937" font-size="14" font-weight="bold">Base de données relationnelle</text>
  <text x="200" y="200" text-anchor="middle" fill="#6b7280" font-size="11">Tables liées par clés étrangères</text>
</svg>







